name: Checks

# Single source of truth for the build/test/installer gate. Called by both ci.yml (branches, PRs)
# and release.yml (tags) so the release can never run a weaker gate than CI.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    # The Neo device and agent backends are absent in CI. Build, typecheck,
    # unit/integration tests, and the offline doctor run on every host OS.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run doctor
      - name: Validate POSIX installer syntax
        if: runner.os != 'Windows'
        shell: bash
        run: bash -n install.sh scripts/install-linux.sh scripts/uninstall-linux.sh scripts/install-macos.sh scripts/uninstall-macos.sh
      - name: Validate PowerShell installer syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path install.ps1), [ref]$tokens, [ref]$parseErrors) | Out-Null
          if ($parseErrors.Count -gt 0) { throw ($parseErrors | Out-String) }
          if ((Get-Content install.cmd -Raw) -notmatch 'install\.ps1') { throw "install.cmd does not launch install.ps1." }
      - name: Exercise Windows login-service install
        if: runner.os == 'Windows' && matrix.node-version == '24'
        shell: pwsh
        run: |
          npm run install:win
          Start-Sleep -Seconds 3
          $pidFile = Join-Path $HOME ".neo-agent-deck\supervisor.pid"
          if (-not (Test-Path $pidFile)) { throw "Windows supervisor PID file is missing." }
      - name: Exercise Windows login-service uninstall
        if: always() && runner.os == 'Windows' && matrix.node-version == '24'
        shell: pwsh
        run: |
          npm run uninstall:win
          $startupFile = Join-Path ([Environment]::GetFolderPath([Environment+SpecialFolder]::Startup)) "Neo Agent Deck.vbs"
          if (Test-Path $startupFile) { throw "Windows startup entry was not removed." }
      - name: Exercise Linux user-service install
        if: runner.os == 'Linux' && matrix.node-version == '24'
        shell: bash
        env:
          NEO_AGENT_DECK_INSTALL_ROOT: ${{ runner.temp }}/neo-agent-deck-install
          NEO_AGENT_DECK_UNIT_DIR: ${{ runner.temp }}/neo-agent-deck-systemd
        run: |
          npm run install:linux -- --no-start --no-udev
          test -f "$NEO_AGENT_DECK_INSTALL_ROOT/dist/src/index.js"
          test -f "$NEO_AGENT_DECK_UNIT_DIR/neo-agent-deck.service"
          grep -F 'Restart=always' "$NEO_AGENT_DECK_UNIT_DIR/neo-agent-deck.service"
          systemd-analyze --user verify "$NEO_AGENT_DECK_UNIT_DIR/neo-agent-deck.service"
      - name: Exercise Linux user-service uninstall
        if: always() && runner.os == 'Linux' && matrix.node-version == '24'
        shell: bash
        env:
          NEO_AGENT_DECK_INSTALL_ROOT: ${{ runner.temp }}/neo-agent-deck-install
          NEO_AGENT_DECK_UNIT_DIR: ${{ runner.temp }}/neo-agent-deck-systemd
        run: |
          npm run uninstall:linux -- --no-stop
          test ! -e "$NEO_AGENT_DECK_INSTALL_ROOT"
          test ! -e "$NEO_AGENT_DECK_UNIT_DIR/neo-agent-deck.service"
