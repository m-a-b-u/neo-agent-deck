name: CI

on:
  push:
  pull_request:

jobs:
  check:
    # macOS-only app; the Neo device and agent backends are absent in CI,
    # so only build, typecheck, and unit tests run.
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
