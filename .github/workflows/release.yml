name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Exercise Windows login-service install
        if: runner.os == 'Windows' && matrix.node-version == '24'
        shell: pwsh
        run: |
          npm run install:win
          Start-Sleep -Seconds 3
          $pidFile = Join-Path $HOME ".neo-agent-deck\supervisor.pid"
          if (-not (Test-Path $pidFile)) { throw "Windows supervisor PID file is missing." }
      - name: Exercise Windows login-service uninstall
        if: always() && runner.os == 'Windows' && matrix.node-version == '24'
        shell: pwsh
        run: npm run uninstall:win

  release:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify tag matches package version
        run: test "v$(node -p \"require('./package.json').version\")" = "$GITHUB_REF_NAME"
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
